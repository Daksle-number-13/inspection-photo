<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#2563EB" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="검사사진" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>검사 사진 자동 등록 시스템</title>
  <link rel="preload" href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/static/pretendard.css" as="style" onload="this.rel='stylesheet'" />
  <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/static/pretendard.css" /></noscript>
  <link rel="stylesheet" href="style.css?v=3">
</head>
<body>

  <!-- ═══════════════════════════════════════
       화면 1: 메인
  ════════════════════════════════════════ -->
  <div id="screen-main" class="screen active">

    <!-- 헤더 -->
    <header class="app-header">
      <div class="header-left">
        <div class="header-subtitle">품질 관리</div>
        <div class="header-title">검사 사진 등록</div>
      </div>
      <div class="header-controls">
        <button id="btn-help" class="header-icon-btn" aria-label="도움말">?</button>
        <button id="btn-settings" class="header-icon-btn" aria-label="설정">⚙</button>
      </div>
    </header>

    <!-- 스텝 인디케이터 -->
    <div class="step-indicator" id="step-indicator">
      <div class="step-item" data-step="1" id="step-1">
        <div class="step-circle" id="step-circle-1">1</div>
        <div class="step-label">기본 정보</div>
      </div>
      <div class="step-line" id="step-line-1"></div>
      <div class="step-item" data-step="2" id="step-2">
        <div class="step-circle" id="step-circle-2">2</div>
        <div class="step-label">제품 정보</div>
      </div>
      <div class="step-line" id="step-line-2"></div>
      <div class="step-item" data-step="3" id="step-3">
        <div class="step-circle" id="step-circle-3">3</div>
        <div class="step-label">사진</div>
      </div>
    </div>

    <!-- 스크롤 영역 -->
    <div class="scroll-area">

      <!-- 섹션 1: 기본 정보 -->
      <section id="section-1" class="card">
        <div class="card-header">
          <div class="card-title">기본 정보</div>
        </div>

        <!-- 날짜 / 시각 -->
        <div class="date-row">
          <div class="date-field" style="flex:3">
            <label for="input-date">촬영 일시</label>
            <input type="date" id="input-date" class="field-input" />
          </div>
          <div class="date-field" style="flex:2">
            <label for="input-time">시각</label>
            <input type="time" id="input-time" class="field-input" />
          </div>
        </div>

        <!-- 업로드 위치 -->
        <div class="folder-section">
          <label>업로드 위치</label>
          <div id="folder-picker" class="folder-picker">
            <!-- JS가 렌더링 -->
          </div>
        </div>
      </section>

      <!-- 섹션 2: 제품 정보 -->
      <section id="section-2" class="card">
        <div class="card-header">
          <div class="card-title">제품 정보</div>
        </div>

        <div class="hist-inputs">
          <!-- 제품 정보 -->
          <div class="hist-input-wrap" id="wrap-product">
            <label class="hist-label">제품 정보</label>
            <div class="hist-input-box" id="box-product">
              <input type="text" id="input-product" class="hist-text" placeholder="예: A001-엔진블록" autocomplete="off" />
              <span class="hist-arrow" id="arrow-product">▾</span>
            </div>
            <div class="hist-dropdown" id="dropdown-product" style="display:none"></div>
          </div>

          <!-- 이력(Lot No.) -->
          <div class="hist-input-wrap" id="wrap-lot">
            <label class="hist-label">이력 (Lot No.)</label>
            <div class="hist-input-box" id="box-lot">
              <input type="text" id="input-lot" class="hist-text" placeholder="예: LOT-2026-001" autocomplete="off" />
              <span class="hist-arrow" id="arrow-lot">▾</span>
            </div>
            <div class="hist-dropdown" id="dropdown-lot" style="display:none"></div>
          </div>

          <!-- 발생 공정 -->
          <div class="hist-input-wrap" id="wrap-process">
            <label class="hist-label">발생 공정</label>
            <div class="hist-input-box" id="box-process">
              <input type="text" id="input-process" class="hist-text" placeholder="예: 프레스, 용접" autocomplete="off" />
              <span class="hist-arrow" id="arrow-process">▾</span>
            </div>
            <div class="hist-dropdown" id="dropdown-process" style="display:none"></div>
          </div>

          <!-- 불량 유형 -->
          <div class="hist-input-wrap" id="wrap-defect">
            <label class="hist-label">불량 유형</label>
            <div class="hist-input-box" id="box-defect">
              <input type="text" id="input-defect" class="hist-text" placeholder="예: 스크래치" autocomplete="off" />
              <span class="hist-arrow" id="arrow-defect">▾</span>
            </div>
            <div class="hist-dropdown" id="dropdown-defect" style="display:none"></div>
          </div>
        </div>
      </section>

      <!-- 섹션 3: 사진 선택 -->
      <section id="section-3" class="card">
        <div class="card-header">
          <div class="card-title">사진 선택</div>
          <div id="photo-count-badge" class="photo-badge" style="display:none"></div>
        </div>

        <!-- 버튼 그리드 -->
        <div class="photo-btn-grid">
          <button id="btn-camera" class="photo-action-btn">
            <span class="photo-btn-icon">📷</span>
            <span class="photo-btn-label">촬영</span>
          </button>
          <button id="btn-gallery" class="photo-action-btn">
            <span class="photo-btn-icon">🖼️</span>
            <span class="photo-btn-label">갤러리</span>
          </button>
        </div>

        <!-- 파일 인풋 -->
        <input type="file" id="file-camera" accept="image/*" capture="environment" style="display:none" />
        <input type="file" id="file-gallery" accept="image/*" multiple style="display:none" />

        <!-- 사진 영역 -->
        <div id="photo-area">
          <div class="photo-empty">
            <div style="font-size:30px">📸</div>
            <div class="photo-empty-text">JPG, PNG · 다중 선택 가능</div>
          </div>
        </div>
      </section>

      <div style="height: 80px;"></div>
    </div><!-- /scroll-area -->

    <!-- 업로드 CTA (fixed bottom) -->
    <div class="cta-wrap" id="cta-wrap">
      <button id="btn-upload" class="cta-btn cta-disabled">
        <span id="cta-text">사진을 선택하세요</span>
      </button>
    </div>

  </div><!-- /screen-main -->

  <!-- ═══════════════════════════════════════
       화면 2: 업로드 중
  ════════════════════════════════════════ -->
  <div id="screen-uploading" class="screen">
    <div class="uploading-wrap">
      <div class="uploading-cloud">☁</div>
      <div class="uploading-title">Cloudike 업로드 중</div>
      <div class="uploading-desc" id="uploading-desc">0장 저장 중...</div>

      <div class="progress-wrap">
        <div class="progress-header">
          <span class="progress-label">진행률</span>
          <span class="progress-pct" id="progress-pct">0%</span>
        </div>
        <div class="progress-track">
          <div class="progress-bar" id="progress-bar" style="width:0%"></div>
        </div>
      </div>

      <div class="uploading-thumbs" id="uploading-thumbs"></div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════
       화면 3: 완료
  ════════════════════════════════════════ -->
  <div id="screen-done" class="screen">
    <div class="done-top" id="done-content">
      <div class="done-check-wrap">
        <svg width="46" height="46" viewBox="0 0 46 46" fill="none">
          <path d="M9 23l11 11 17-17" stroke="#10B981" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="done-title">업로드 완료!</div>
      <div class="done-desc">모든 사진이 성공적으로<br>Cloudike에 저장되었습니다.</div>
    </div>
    <div class="done-actions">
      <button id="btn-done-new" class="cta-btn cta-active">
        새로 등록하기
      </button>
      <button id="btn-done-back" class="secondary-btn">
        돌아가기
      </button>
    </div>
  </div>

  <!-- ═══════════════════════════════════════
       화면 4: 설정
  ════════════════════════════════════════ -->
  <div id="screen-settings" class="screen">
    <header class="app-header">
      <button id="btn-back" class="header-icon-btn back-btn">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M11 4L6 9l5 5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="header-left">
        <div class="header-subtitle">환경 설정</div>
        <div class="header-title">업로드 폴더 관리</div>
      </div>
    </header>

    <div class="scroll-area">

      <!-- 폴더 추가 -->
      <section class="card">
        <div class="card-header">
          <div class="card-title">폴더 추가</div>
        </div>
        <div class="settings-fields">
          <div>
            <label for="setting-tag">태그명</label>
            <input type="text" id="setting-tag" class="field-input" placeholder="예: 라인A, 불량전용" />
          </div>
          <div>
            <label for="setting-url">Cloudike 공유링크 URL</label>
            <input type="url" id="setting-url" class="field-input" placeholder="https://..." />
          </div>
          <button id="btn-add-folder" class="add-folder-btn" disabled>+ 폴더 추가</button>
        </div>
      </section>

      <!-- 등록된 폴더 -->
      <section class="card">
        <div class="card-header">
          <div class="card-title">등록된 폴더</div>
          <div class="folder-count-badge" id="folder-count-badge">0개</div>
        </div>
        <ul id="folder-list" class="folder-list-new"></ul>
      </section>

      <!-- 설정 백업 -->
      <section class="card">
        <div class="card-header">
          <div class="card-title">설정 백업</div>
        </div>
        <div class="backup-row">
          <button id="btn-export-settings" class="secondary-btn">📥 설정 내보내기</button>
          <button id="btn-import-settings" class="secondary-btn">📤 설정 불러오기</button>
        </div>
        <input type="file" id="file-import-settings" accept=".json" style="display:none" />
        <div class="version-info">
          버전 <strong>Rev1.3</strong> · 2026-05-12<br>
          Made by <strong>박진수_Park Jin-su</strong>
        </div>
      </section>

      <div style="height:24px"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
